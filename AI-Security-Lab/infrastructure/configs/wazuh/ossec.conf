<!-- Wazuh Manager Configuration for AI Security Lab -->
<ossec_config>

  <!-- ============================================= -->
  <!-- 1. Splunk HEC Integration (Alert Forwarding)  -->
  <!-- ============================================= -->
  <integration>
    <name>custom-splunk-hec</name>
    <!-- GCP edition: the lab VM and the Splunk VM are in the SAME VPC, so Wazuh forwards
         directly to Splunk's INTERNAL IP over the private network. No IAP tunnel and no
         host.docker.internal needed - the container egresses the lab VM and reaches the
         Splunk VM's internal IP. Replace with your Splunk VM's internal IP. -->
    <hook_url>https://10.0.10.10:8088/services/collector</hook_url>
    <!-- Use the Splunk "Wazuh_Token" (HEC) which routes to the `ai_logs` index.
         Scenario detection SPL queries `index=ai_logs`. See infrastructure/SPLUNK_SETUP.md §4-5. -->
    <api_key>YOUR_SPLUNK_HEC_TOKEN</api_key>   <!-- 填 Wazuh_Token,实际值记在本地 docs/setup/credentials.md(不上传) -->
    <level>5</level>
    <alert_format>json</alert_format>
  </integration>

  <!-- ============================================= -->
  <!-- 1a. Remote listener (required for startup)    -->
  <!-- wazuh-control aborts the ENTIRE manager start -->
  <!-- if wazuh-remoted has no <remote> block at all -->
  <!-- (not just a harmless warning) - we don't use  -->
  <!-- real Wazuh agents in this lab, this just lets -->
  <!-- remoted initialize so analysisd/db/modulesd   -->
  <!-- actually stay running.                        -->
  <!-- ============================================= -->
  <remote>
    <connection>secure</connection>
    <port>1514</port>
    <protocol>tcp</protocol>
    <queue_size>131072</queue_size>
  </remote>

  <!-- ============================================= -->
  <!-- 2. AI App Log Collection (Shared Volume)      -->
  <!-- Apps write clean single-layer JSON directly   -->
  <!-- to /var/log/ai-lab/*.json via FileHandler.    -->
  <!-- This bypasses Docker's double-JSON wrapping.  -->
  <!-- Wazuh's built-in JSON decoder extracts fields -->
  <!-- like endpoint, prompt, tool_invoked directly. -->
  <!-- ============================================= -->
  <!-- Wildcard picks up ALL app logs: llm-app / rag-app / agent-app / ml-api (.json),
       so adding a new target app needs no ossec.conf change. -->
  <localfile>
    <log_format>json</log_format>
    <location>/var/log/ai-lab/*.json</location>
  </localfile>

  <!-- ============================================= -->
  <!-- 3. Ruleset: official ruleset MUST load before -->
  <!-- our custom rules, so 100001/100002/100003 can -->
  <!-- attach to an existing category root node      -->
  <!-- (otherwise: "Category was not found", 0 rules -->
  <!-- enabled, analysisd exits).                    -->
  <!-- ============================================= -->
  <ruleset>
    <decoder_dir>ruleset/decoders</decoder_dir>
    <rule_dir>ruleset/rules</rule_dir>
    <!-- Suricata's generic JSON catch-all (86600) matches on decoded_as=json + a
         "timestamp" field + an "event_type" field - our AI app logs happen to have
         both, so it swallows our events before our own rules get evaluated. We don't
         run Suricata anywhere in this lab, so just exclude its ruleset. -->
    <rule_exclude>0475-suricata_rules.xml</rule_exclude>
    <rule_dir>etc/rules</rule_dir>
  </ruleset>

</ossec_config>
